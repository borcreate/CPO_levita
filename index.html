<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEVITA CPO Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f2f7;--bg2:#ffffff;--bg3:#f7f7fa;--bg4:#ebebf0;
  --gold:#b8902a;--gold-dim:rgba(184,144,42,0.08);
  --text:#1c1c2e;--muted:#333333;--muted2:#666666;
  --green:#16a34a;--yellow:#ca8a04;--red:#dc2626;--blue:#2563eb;--purple:#7c3aed;
  --border:#e5e7eb;--r:10px;
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:56px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:200;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.hdr-logo{font-size:18px;font-weight:800;letter-spacing:5px;color:var(--gold)}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px}
.hdr-date{font-size:11px;color:var(--muted)}
.nav{display:flex;padding:0 28px;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto;gap:4px;position:sticky;top:56px;z-index:199}
.nav-tab{padding:14px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s}
.nav-tab:hover{color:var(--text);background:var(--bg3)}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}
main{padding:28px 28px;max-width:1440px;margin:0 auto}
.page{display:none}.page.active{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-pad{padding:20px}
.loading{padding:40px;text-align:center;color:var(--muted);font-size:13px}
.error{padding:20px;background:rgba(220,38,38,.1);border:1px solid #dc2626;color:#dc2626;border-radius:6px;margin:20px 0}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-logo">LEVITA</div>
    <div class="hdr-sub">CPO Dashboard · 2026</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="hdr-date" id="hdrDate"></div>
    <button onclick="location.reload(true)" style="background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;transition:.15s" onmouseover="this.style.borderColor='#b8902a';this.style.color='#b8902a'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">↻ Обновить</button>
  </div>
</div>

<nav class="nav" id="nav-tabs"></nav>

<main id="pages-container">
  <div class="loading">Загрузка данных из таблицы...</div>
</main>

<script>
// Google Sheets ID
const SHEET_ID = '1yCNQZ3GLeA5H9l10Jhi9IrUWVTiTR4RbP4CgYn1DHlA';

// Листы которые загружать
const SHEETS_TO_LOAD = [
  'Фокусные метрики',
  'Дашборд',
  'Карта франчайзи',
  'Аналитика года'
];

// Главная функция загрузки
async function initDashboard() {
  try {
    console.log('Загружаю листы...');
    
    // Загружу каждый лист
    const sheetsData = {};
    
    for (const sheetName of SHEETS_TO_LOAD) {
      try {
        const data = await loadSheet(sheetName);
        sheetsData[sheetName] = data;
        console.log(`✓ Загружен лист "${sheetName}": ${data.length} строк`);
      } catch (e) {
        console.warn(`⚠ Не удалось загрузить "${sheetName}":`, e);
      }
    }
    
    // Отрисую интерфейс
    renderDashboard(sheetsData);
    
  } catch (e) {
    console.error('Ошибка инициализации:', e);
    document.getElementById('pages-container').innerHTML = `
      <div class="error">
        <strong>Ошибка загрузки данных:</strong><br>
        ${e.message}<br><br>
        <small>Убедитесь, что таблица доступна и имеет нужные листы.</small>
      </div>
    `;
  }
}

// Загрузка отдельного листа через Google Visualization API
async function loadSheet(sheetName) {
  return new Promise((resolve, reject) => {
    const query = new google.visualization.Query(
      `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}`
    );
    
    query.send((response) => {
      if (response.isError()) {
        reject(new Error(`Ошибка загрузки листа "${sheetName}": ${response.getReasons()}`));
      } else {
        const table = response.getDataTable();
        const rows = [];
        
        // Конвертирую таблицу в массив
        for (let i = 0; i < table.getNumberOfRows(); i++) {
          const row = [];
          for (let j = 0; j < table.getNumberOfColumns(); j++) {
            row.push(table.getValue(i, j));
          }
          rows.push(row);
        }
        
        resolve(rows);
      }
    });
  });
}

// Отрисовка дашборда
function renderDashboard(sheetsData) {
  const container = document.getElementById('pages-container');
  const navTabs = document.getElementById('nav-tabs');
  
  // Очищу
  container.innerHTML = '';
  navTabs.innerHTML = '';
  
  let isFirst = true;
  
  for (const sheetName in sheetsData) {
    const data = sheetsData[sheetName];
    
    // Таб навигации
    const tab = document.createElement('div');
    tab.className = `nav-tab ${isFirst ? 'active' : ''}`;
    tab.textContent = sheetName;
    tab.onclick = () => switchPage(sheetName);
    navTabs.appendChild(tab);
    
    // Страница с содержимым
    const page = document.createElement('div');
    page.className = `page ${isFirst ? 'active' : ''}`;
    page.id = `page-${sheetName}`;
    page.innerHTML = renderSheetContent(sheetName, data);
    container.appendChild(page);
    
    isFirst = false;
  }
  
  // Дата
  const now = new Date();
  document.getElementById('hdrDate').textContent = now.toLocaleDateString('ru', {month:'long', year:'numeric'});
}

function switchPage(sheetName) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  
  document.getElementById(`page-${sheetName}`).classList.add('active');
  event.target.classList.add('active');
}

function renderSheetContent(sheetName, rows) {
  // Простая таблица для начала
  let html = '<div class="card card-pad"><table style="width:100%;border-collapse:collapse">';
  
  for (let i = 0; i < Math.min(rows.length, 50); i++) {
    html += '<tr>';
    for (let j = 0; j < Math.min(rows[i].length, 10); j++) {
      const val = rows[i][j];
      const tag = i === 0 ? 'th' : 'td';
      const style = i === 0 ? 'style="border-bottom:1px solid var(--border);padding:8px;font-weight:600;text-align:left"' : 'style="border-bottom:1px solid var(--border);padding:8px"';
      html += `<${tag} ${style}>${val || ''}</${tag}>`;
    }
    html += '</tr>';
  }
  
  html += '</table></div>';
  return html;
}

// Загружу Google Visualization API
const script = document.createElement('script');
script.src = 'https://www.gstatic.com/charts/loader.js';
script.onload = () => {
  google.charts.load('current', {packages: ['corechart', 'table']});
  google.charts.setOnLoadCallback(initDashboard);
};
document.head.appendChild(script);
</script>
</body>
</html>
